book:
  output-file: language-reading-predictors-report
  title: "Predictors of progress in language and reading skills for children with Down syndrome"
  subtitle: "Predictors of progress and the effect of intervention — an exploratory Bayesian study"
  abstract: |
    Children with Down syndrome typically show delayed and uneven development of spoken language and reading. Families and educators want practical, interpretable evidence: which skills can be expected to progress, how far targeted teaching helps, and which earlier skills predict later progress. This exploratory study re-analyses longitudinal data from a randomised waitlist-crossover trial of a structured reading and language intervention (Burgoyne et al., 2012), spanning vocabulary, grammar, speech and early reading across four measurement points.

    We follow a deliberate two-step approach. Gradient-boosting models first screen which predictors carry out-of-sample signal; Bayesian models (PyMC) then estimate interpretable quantities — the randomised intervention effect, dose–response and mediation — with full uncertainty, reported as posterior credible intervals and probabilities rather than p-values. An agreed causal diagram (DAG) governs interpretation: only the randomised contrast is read as causal, while every other relationship is reported as an adjusted association, never as one skill "driving" another.

    A plain-language summary of the headline findings and their uncertainty will be inserted once results are finalised. All data and models are preliminary and are shared for transparency and discussion.
