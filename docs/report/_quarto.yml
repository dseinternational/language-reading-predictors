project:
  type: book

  output-dir: ../../output/report

  preview:
    port: 4201
    browser: true
    watch-inputs: true

jupyter: python3

execute:
  freeze: true

date: now

toc: true
toc-title: Contents
number-sections: true
number-depth: 3

bibliography: references.bib
csl: apa.csl

book:
  output-file: language-reading-predictors-report
  title: "Predictors of progress in language and reading skills for children with Down syndrome"
  author:
    - name: Frank Buckley
      orcid: 0000-0002-9708-2705
      affiliations:
        - name: Down Syndrome Education International
          state: Cumbria
          country: UK
      roles: writing
      corresponding: true
    - name: Sue Buckley
      orcid: 0000-0002-9044-3088
      affiliations:
        - name: Down Syndrome Education International
          state: Cumbria
          country: UK
        - name: University of Portsmouth
          city: Portsmouth
          state: Hampshire
          country: UK
      roles: writing
  chapters:
    - index.qmd
    - acknowledgements.qmd
    - summary.qmd
    - glossary.qmd
    - part: "Background and aims"
      chapters:
        - chapters/intro.qmd
    - part: "Methods"
      chapters:
        - chapters/methods-data.qmd
        - chapters/methods-models.qmd
    - part: "Results"
      chapters:
        - evidence-table.qmd
        - chapters/results-itt.qmd
    - part: "Discussion"
      chapters:
        - chapters/discussion.qmd
  appendices:
    - appendices/ai.qmd
    - references.qmd

format:
  html:
    code-fold: true
    theme: default
  docx:
    reference-doc: ../template.docx
  pdf:
    documentclass: report
    papersize: a4
    colorlinks: true
    link-citations: true
    fontsize: 12pt
    mainfont: "Source Sans 3"
    sansfont: "Source Sans 3"
    monofont: "Monaspace Neon"
    monofontoptions: "Scale=0.75"
    linestretch: 1.25
    geometry:
      - top=30mm
      - left=25mm
      - right=25mm
      - bottom=30mm
    include-in-header: footer.tex
    