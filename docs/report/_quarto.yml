# PDF is the canonical (print-first) deliverable; HTML is a convenience build and
# must depend on nothing interactive (no code-fold / folded callouts). DOCX was
# removed in Phase 0 — there is no reference template and the tiered design does not
# survive a Word export; re-add a `docx:` block with a `reference-doc` if a
# stakeholder needs it. See notes/202606261500-technical-report-plan.md.
format:
