name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  spellcheck:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7.0.0


      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "25"

      - name: Install dependencies
        run: npm ci

      - name: Run spellcheck
        run: npm run spellcheck

      - name: Check formatting
        run: npm run format:check

  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7.0.0


      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ scripts/

  test-python:
    runs-on: ubuntu-26.04
    defaults:
      run:
        shell: bash -el {0}
        working-directory: language-reading-predictors
    steps:
      - name: Checkout language-reading-predictors
        uses: actions/checkout@v7.0.0
        with:
          path: language-reading-predictors

      - name: Checkout research (sibling dependency)
        uses: actions/checkout@v7.0.0
        with:
          repository: dseinternational/research
          path: research

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: dse-language-reading-predictors
          miniforge-version: latest

      - name: Cache conda env
        id: conda-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.CONDA }}/envs/dse-language-reading-predictors
          key: conda-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('language-reading-predictors/environment.yml') }}

      - name: Create env (cache miss)
        if: steps.conda-cache.outputs.cache-hit != 'true'
        run: conda env update -n dse-language-reading-predictors -f environment.yml

      - name: Install editable packages
        run: |
          pip install -e ../research/src/python
          pip install -e .

      - name: Run pytest
        run: pytest
