name: dse-language-reading-predictors
channels:
  - conda-forge
dependencies:
  # ── shared conda-forge compiled core (canonical) ──────────────────────────
  # Must match dse-research-utils' data/environment-core.yml exactly. Verify:
  #   dse-check-env environment.yml
  - python=3.14.6
  - numpy>=2.4.6,<2.5 # numba 0.65.1 requires numpy <2.5; lift the cap when numba supports 2.5
  - scipy>=1.18.0
  - pandas>=3.0.3
  - numba>=0.65.1
  - matplotlib>=3.11.0
  - scikit-learn>=1.9.0
  - statsmodels>=0.14.6
  - pymc>=6.0.1 # pulls pytensor + a C toolchain from conda-forge
  - nutpie>=0.16.11
  - numpyro>=0.21.0
  - jax>=0.10.2 # CPU build; GPU acceleration via an environment-gpu.yml overlay
  - arviz>=1.2.0
  - arviz-base>=1.2.0
  - arviz-stats>=1.2.0
  - arviz-plots>=1.2.0
  - preliz>=0.27.0
  - h5py>=3.12.0
  - h5netcdf>=1.3.0
  - graphviz>=14.1.2
  - python-graphviz>=0.20
  # ── LRP add-ons (gradient boosting, graphs, array storage) ────────────────
  - lightgbm>=4.6.0
  - xgboost>=3.3.0
  - shap>=0.52.0
  - networkx # DAG plotting via dse_research_utils.plot.graphs (uses python-graphviz)
  - xarray>=2026.4.0
  - pip
  - pip:
      # Shared library from the public git tag (no auth; PyPI is a later
      # graduation). Its extras pull the pure-Python tail: viz (seaborn),
      # notebook (ipython/ipywidgets/notebook/jupytext), dependence (dcor),
      # tuning (optuna, optuna-integration), io (orjson/tabulate). This also
      # pulls the library's own runtime deps (azure-identity/-storage-blob,
      # rich, psutil, pyyaml, …) — no need to list them here. Graph plotting
      # (graphviz/networkx) is served by the conda-forge core + add-ons, so the
      # `graphs` extra is intentionally omitted.
      - dse-research-utils[viz,notebook,dependence,tuning,io] @ git+https://github.com/dseinternational/research.git@v0.7.0#subdirectory=src/python
      - -e ./
      # Local-dev override — to develop against a sibling checkout of research,
      # comment the git line above and uncomment this instead:
      # - -e ../research/src/python[viz,notebook,dependence,tuning,io]
      # typing stubs + dev / build tooling
      - pandas-stubs
      - scipy-stubs
      - hatch
      - build
      - pytest>=9.1.1
      - ruff>=0.15.20
      - mypy>=1.18.2
      - setuptools>=82.0.1
