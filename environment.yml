      - preliz>=0.27.0
      - pytest>=9.1.1
      - rich>=15.0.0
      - ruff>=0.15.20
      - scikit-learn>=1.9.0
      - scipy-stubs
      - seaborn>=0.13.2
      - setuptools>=81.0.0
      - shap>=0.52.0
      - tabulate>=0.10.0
      - xarray>=2026.4.0
